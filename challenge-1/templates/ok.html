<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmación de Pago Liquidado</title>
</head>
<body style="margin: 0; padding: 0; background-color: #fff7fb; font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
    <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: #fff7fb;">
        <tr>
            <td align="center" style="padding: 20px 0;">
                <table border="0" cellpadding="0" cellspacing="0" width="600" style="background-color: #ffffff; border-radius: 24px; overflow: hidden; box-shadow: 0px 12px 32px rgba(116, 34, 140, 0.06);">
                    <!-- Header with Logo -->
                    <tr>
                        <td align="center" style="padding: 30px 40px; background-color: #fff7fb;">
                            <img src="https://prodimerperu.com/wp-content/uploads/2025/08/yape-app-logo-png_seeklogo-399697.png" alt="Yape Logo" width="120" style="display: block; border: 0;">
                        </td>
                    </tr>
                    
                    <!-- Hero Section -->
                    <tr>
                        <td align="center" style="padding: 40px; background: #590071; background: linear-gradient(135deg, #590071 0%, #74228c 100%); color: #ffffff;">
                            <div style="background-color: #54fcda; width: 64px; height: 64px; border-radius: 50%; display: inline-block; margin-bottom: 20px; line-height: 64px;">
                                <span style="font-size: 32px; color: #00201a;">⌛</span>
                            </div>
                            <h1 style="margin: 0; font-size: 24px; font-weight: 700; letter-spacing: -0.5px;">Hemos recibido tu pago</h1>
                            <p style="margin: 10px 0 0; font-size: 14px; opacity: 0.9;">Tu transacción está siendo procesada en nuestro sistema.</p>
                        </td>
                    </tr>

                    <!-- Transaction Details Card -->
                    <tr>
                        <td style="padding: 40px;">
                            <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                <tr>
                                    <td align="center" style="padding-bottom: 30px;">
                                        <span style="font-size: 12px; font-weight: 700; color: #817381; text-transform: uppercase; letter-spacing: 1.5px;">Monto Total</span>
                                        <div style="font-size: 48px; font-weight: 800; color: #590071; margin-top: 5px;">
                                            <span style="font-size: 24px; vertical-align: middle; opacity: 0.7;">{{currency}}</span>{{amount}}
                                        </div>
                                    </td>
                                </tr>
                                <tr>
                                    <td style="border-top: 1px solid #f1e5ee; padding-top: 30px;">
                                        <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                            <tr>
                                                <td width="50%" style="font-size: 14px; color: #817381; padding-bottom: 5px;">ID del Pago</td>
                                            </tr>
                                            <tr>
                                                <td style="padding-bottom: 20px;">
                                                    <code style="font-family: monospace; font-size: 13px; background-color: #f7eaf4; padding: 4px 8px; border-radius: 4px; color: #201a20; word-break: break-all;">{{id}}</code>
                                                </td>
                                            </tr>
                                            <tr>
                                                <td>
                                                    <table border="0" cellpadding="0" cellspacing="0" width="100%">
                                                        <tr>
                                                            <td width="50%">
                                                                <span style="display: block; font-size: 12px; color: #817381; margin-bottom: 5px;">Estado</span>
                                                                <span style="background-color: #fffbdf; color: #856404; font-size: 12px; font-weight: 700; padding: 4px 12px; border-radius: 100px; display: inline-block;">PENDING</span>
                                                            </td>
                                                            <td width="50%" align="right">
                                                                <span style="display: block; font-size: 12px; color: #817381; margin-bottom: 5px;">Modelo de Consistencia</span>
                                                                <span style="font-weight: 600; font-size: 14px; color: #201a20;">Eventual</span>
                                                            </td>
                                                        </tr>
                                                    </table>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- Action Button -->
                    <tr>
                        <td align="center" style="padding: 0 40px 40px;">
                            <a href="#" style="background: #590071; background: linear-gradient(135deg, #590071 0%, #74228c 100%); color: #ffffff; padding: 16px 36px; border-radius: 100px; text-decoration: none; font-weight: 700; font-size: 16px; display: inline-block;">Ver Detalles en App</a>
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td align="center" style="padding: 30px; background-color: #fff7fb; font-size: 12px; color: #817381;">
                            <div style="margin-bottom: 15px;">
                                <a href="#" style="color: #817381; text-decoration: underline; margin: 0 10px;">Ayuda</a>
                                <a href="#" style="color: #817381; text-decoration: underline; margin: 0 10px;">Términos</a>
                                <a href="#" style="color: #817381; text-decoration: underline; margin: 0 10px;">Privacidad</a>
                            </div>
                            <p style="margin: 0;">© 2026 Yape. Todos los derechos reservados.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
