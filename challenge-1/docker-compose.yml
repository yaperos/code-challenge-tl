services:
  db:
    image: postgres:15-alpine
    container_name: challenge_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: payments_db
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d payments_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - payment-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - payment-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - payment-network

  payment-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment_api
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "3001:3001"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=payments_db
      - KAFKA_BROKERS=kafka:29092
      - NODE_ENV=production
    networks:
      - payment-network
    command: ["node", "dist/apps/api/main"]

  payment-relay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment_relay
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=payments_db
      - KAFKA_BROKERS=kafka:29092
      - NODE_ENV=production
    networks:
      - payment-network
    command: ["node", "dist/apps/relay/main"]

  payment-consumers:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: payment_consumers
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=payments_db
      - KAFKA_BROKERS=kafka:29092
      - BREVO_API_KEY=${BREVO_API_KEY}
      - NOTIFY_TARGET_EMAIL=${NOTIFY_TARGET_EMAIL}
      - SENDER_EMAIL=${SENDER_EMAIL}
      - NODE_ENV=production
    networks:
      - payment-network
    command: ["node", "dist/apps/consumers/main"]

networks:
  payment-network:
    driver: bridge
